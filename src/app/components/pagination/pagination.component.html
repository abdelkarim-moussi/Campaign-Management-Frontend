@if (totalPages > 1) {
<div class="flex items-center justify-between mt-6 pt-4 border-t border-border">
  <!-- Item count -->
  <div class="text-xs text-text-muted">
    Showing {{ startItem }} – {{ endItem }} of {{ totalElements }}
  </div>

  <!-- Page controls -->
  <div class="flex items-center gap-1">
    <!-- Previous -->
    <button (click)="previousPage()" [disabled]="currentPage === 0"
      class="px-2.5 py-1.5 text-xs font-medium border border-border text-text-muted hover:bg-primary-light hover:text-text-dark transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      &#x2190; Prev
    </button>

    <!-- Page numbers -->
    @if (pages[0] > 0) {
    <button (click)="goToPage(0)"
      class="w-8 h-8 text-xs font-medium border border-border text-text-muted hover:bg-primary-light transition-colors">
      1
    </button>
    @if (pages[0] > 1) {
    <span class="px-1 text-xs text-text-muted/50">…</span>
    }
    }

    @for (page of pages; track page) {
    <button (click)="goToPage(page)" class="w-8 h-8 text-xs font-medium border transition-colors" [class]="
            page === currentPage
              ? 'bg-primary text-white border-primary'
              : 'border-border text-text-muted hover:bg-primary-light'
          ">
      {{ page + 1 }}
    </button>
    }

    @if (pages[pages.length - 1] < totalPages - 1) { @if (pages[pages.length - 1] < totalPages - 2) { <span
      class="px-1 text-xs text-text-muted/50">…</span>
      }
      <button (click)="goToPage(totalPages - 1)"
        class="w-8 h-8 text-xs font-medium border border-border text-text-muted hover:bg-primary-light transition-colors">
        {{ totalPages }}
      </button>
      }

      <!-- Next -->
      <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1"
        class="px-2.5 py-1.5 text-xs font-medium border border-border text-text-muted hover:bg-primary-light hover:text-text-dark transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        Next &#x2192;
      </button>
  </div>
</div>
}
