@if (isOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center" (click)="onCancel()">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity"></div>

    <!-- Dialog -->
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 p-6 animate-dialog"
        (click)="$event.stopPropagation()">
        <!-- Icon -->
        <div class="flex justify-center mb-4">
            <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
        </div>

        <!-- Text -->
        <h3 class="text-center text-lg font-semibold text-gray-900 mb-1">
            {{ title }}
        </h3>
        <p class="text-center text-sm text-gray-500 mb-6">
            {{ message }}
        </p>

        <!-- Actions -->
        <div class="flex gap-3">
            <button (click)="onCancel()"
                class="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                Cancel
            </button>
            <button (click)="onConfirm()"
                class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-red-500 rounded-lg hover:bg-red-600 transition-colors">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
}
