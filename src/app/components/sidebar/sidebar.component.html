<aside class="fixed left-0 top-0 h-screen w-60 bg-primary flex flex-col z-50">
  <!-- Logo -->
  <div class="px-6 py-6 border-b border-primary-hover">
    <h1 class="text-xl font-bold text-white tracking-wide">EasyTakrawt</h1>
    <p class="text-xs text-accent mt-1">Campaign Management</p>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-primary-hover text-white"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-3 px-4 py-3 text-sm text-primary-light/80 hover:bg-primary-hover hover:text-white transition-colors"
      >
        <span class="text-lg" [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User section -->
  <div class="px-4 py-4 border-t border-primary-hover">
    <div class="flex items-center gap-3 mb-3">
      <div
        class="w-8 h-8 bg-accent flex items-center justify-center text-white text-sm font-semibold"
      >
        {{ getUserInitials() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm text-white truncate">{{ getUsername() }}</p>
        <p class="text-xs text-primary-light/60 truncate">
          {{ getUserEmail() }}
        </p>
      </div>
    </div>
    <button
      (click)="logout()"
      class="w-full flex items-center gap-2 px-4 py-2 text-sm text-primary-light/70 hover:bg-danger hover:text-white transition-colors"
    >
      <span>&#x23FB;</span>
      <span>Logout</span>
    </button>
  </div>
</aside>
